<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JankyUtils Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg1: #4facfe;
  --bg2: #00f2fe;
  --text: #ffffff;
  --card: rgba(0,0,0,0.25);
  --btn: #ffffff;
  --btnText: #222;
}

body.dark {
  --bg1: #0f2027;
  --bg2: #203a43;
  --text: #eaeaea;
  --card: rgba(255,255,255,0.08);
  --btn: #222;
  --btnText: #fff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text);
  background: linear-gradient(270deg, var(--bg1), var(--bg2));
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  text-align: center;
  max-width: 600px;
  padding: 40px;
  background: var(--card);
  border-radius: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 3em;
  margin-bottom: 10px;
}

p {
  opacity: 0.85;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  margin-top: 25px;
}

a.button {
  display: block;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  background: var(--btn);
  color: var(--btnText);
  font-weight: bold;
  transition: 0.3s;
}

a.button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  font-size: 14px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙 Dark Mode</div>

<div class="container">
  <h1>JankyUtils ⚙️</h1>
  <p>Simple, weird, and useful tools made for fun.</p>

  <div class="grid">
    <a class="button" href="/VIDtoPPTX">🎥 VID to PPTX Converter</a>
  </div>
</div>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if (localStorage.getItem("dark") === "true") {
  document.body.classList.add("dark");
}
</script>

</body>
</html>
