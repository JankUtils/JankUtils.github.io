<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Dark Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg1: #4facfe;
  --bg2: #00f2fe;
  --bg3: #43e97b;
  --text: white;
  --card: rgba(0,0,0,0.25);
  --button-bg: white;
  --button-text: #333;
}

body.dark {
  --bg1: #141e30;
  --bg2: #243b55;
  --bg3: #000000;
  --text: #e0e0e0;
  --card: rgba(255,255,255,0.1);
  --button-bg: #222;
  --button-text: #fff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(270deg, var(--bg1), var(--bg2), var(--bg3));
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  transition: background 0.5s, color 0.5s;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* SWITCH */
.switch {
  position: absolute;
  top: 20px;
  right: 20px;
}

.switch input {
  display: none;
}

.slider {
  width: 60px;
  height: 30px;
  background: #ccc;
  border-radius: 30px;
  position: relative;
  cursor: pointer;
  transition: 0.4s;
}

.slider::before {
  content: "";
  position: absolute;
  width: 24px;
  height: 24px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.4s;
}

input:checked + .slider {
  background: #222;
}

input:checked + .slider::before {
  transform: translateX(30px);
}

/* CARD */
.card {
  background: var(--card);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  max-width: 400px;
  animation: fadeIn 1.5s ease, float 4s ease-in-out infinite;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

/* BUTTON (RESTORED SMOOTH EFFECTS) */
button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: var(--button-bg);
  color: var(--button-text);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px var(--button-bg);
}

/* Ripple effect */
button::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(0,0,0,0.2);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.4s, height 0.4s;
}

button:active::after {
  width: 200px;
  height: 200px;
  transition: 0s;
}

</style>
</head>
<body>

<label class="switch">
  <input type="checkbox" id="toggle">
  <span class="slider"></span>
</label>

<div class="card">
  <h1>Welcome 🚀</h1>
  <p>Now everything is smooth again.</p>
  <button onclick="alert('Now THAT is smooth 😎')">Click Me</button>
</div>

<script>
const toggle = document.getElementById("toggle");

if (localStorage.getItem("darkMode") === "true") {
  document.body.classList.add("dark");
  toggle.checked = true;
}

toggle.addEventListener("change", () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", toggle.checked);
});
</script>

</body>
</html>
