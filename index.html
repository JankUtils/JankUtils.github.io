<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Cool Animated Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg1: #4facfe;
      --bg2: #00f2fe;
      --bg3: #43e97b;
      --text: white;
      --card: rgba(0,0,0,0.25);
      --button-bg: white;
      --button-text: #333;
    }

    body.dark {
      --bg1: #141e30;
      --bg2: #243b55;
      --bg3: #000000;
      --text: #e0e0e0;
      --card: rgba(255,255,255,0.1);
      --button-bg: #222;
      --button-text: #fff;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(270deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 600% 600%;
      animation: gradientMove 10s ease infinite;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      transition: background 0.5s, color 0.5s;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      max-width: 400px;
      animation: fadeIn 1.5s ease, float 4s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    p {
      opacity: 0.9;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--button-text);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px var(--button-bg);
    }

    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 14px;
      cursor: pointer;
      opacity: 0.8;
    }

  </style>
</head>
<body>

  <div class="toggle" onclick="toggleDarkMode()">🌙 Toggle</div>

  <div class="card">
    <h1>Welcome 🚀</h1>
    <p>This is your animated website with dark mode.</p>
    <button onclick="alert('Smooth, right? 😎')">Click Me</button>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    }

    // Load saved preference
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }
  </script>

</body>
</html>
